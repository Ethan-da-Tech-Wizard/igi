name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Job 1: build + unit tests ─────────────────────────────────────────────────
jobs:
  build-and-test:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install cmake qt tesseract leptonica pkg-config googletest

      - name: Export Qt and pkg-config paths
        run: |
          QT_PREFIX="$(brew --prefix qt)"
          echo "CMAKE_PREFIX_PATH=${QT_PREFIX}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix tesseract)/lib/pkgconfig:$(brew --prefix leptonica)/lib/pkgconfig" >> "$GITHUB_ENV"

      # ── Dependency integrity check (T-1: poisoned Homebrew formula) ──────────
      # Verifies that installed tesseract/leptonica versions and dylib SHA-256
      # hashes match deps.lock. Any mismatch = hard CI failure.
      # Update lockfile after intentional upgrades: python3 scripts/verify_deps.py --update
      - name: Verify dependency integrity
        run: python3 scripts/verify_deps.py

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Unit tests
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure

      # Upload the built bundle so the next job can use it without rebuilding.
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: igi-app-unsigned
          path: build/igi.app
          retention-days: 1

# ── Job 2: bundle, sign (ad-hoc in CI), and D-007 sandbox test ───────────────
  bundle-sign-sandbox:
    runs-on: macos-14
    timeout-minutes: 20
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built bundle
        uses: actions/download-artifact@v4
        with:
          name: igi-app-unsigned
          path: build/igi.app

      # Restore executable bit lost during artifact round-trip.
      - name: Restore executable permissions
        run: chmod +x build/igi.app/Contents/MacOS/igi

      # ── Signing ─────────────────────────────────────────────────────────────
      # In CI we always sign ad-hoc ("-") unless a Developer ID cert is
      # provided via repository secrets.  Ad-hoc signing satisfies Gatekeeper
      # for local installs on the same machine; full Developer ID + notarization
      # is triggered only on pushes to main when the secrets are set.
      - name: Import Developer ID certificate (if secret is set)
        if: ${{ secrets.APPLE_CERT_P12 != '' }}
        env:
          APPLE_CERT_P12:       ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD:  ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN="igi-ci.keychain"
          security create-keychain -p "" "${KEYCHAIN}"
          security default-keychain -s "${KEYCHAIN}"
          security unlock-keychain -p "" "${KEYCHAIN}"
          # Decode the base64-encoded .p12 and import it.
          echo "${APPLE_CERT_P12}" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
              -k "${KEYCHAIN}" \
              -P "${APPLE_CERT_PASSWORD}" \
              -T /usr/bin/codesign \
              -T /usr/bin/security
          security set-key-partition-list \
              -S apple-tool:,apple: \
              -s -k "" "${KEYCHAIN}"
          rm -f /tmp/cert.p12

      - name: Sign bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
          IGI_BUILD_DIR: ${{ github.workspace }}/build
        run: ./scripts/sign_and_notarize.sh

      # ── D-007 write-deny sandbox test ────────────────────────────────────────
      - name: D-007 write-deny sandbox test
        run: ./scripts/sandbox_test.sh build/igi.app/Contents/MacOS/igi

      # ── Notarize (only on push to main AND if secrets are configured) ────────
      - name: Notarize and staple
        if: >
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          secrets.APPLE_ID != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:               ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD:     ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID:          ${{ secrets.APPLE_TEAM_ID }}
          IGI_BUILD_DIR:          ${{ github.workspace }}/build
        run: ./scripts/sign_and_notarize.sh --notarize

      # Upload the final (signed/notarized) DMG as a release artifact.
      - name: Upload signed bundle
        uses: actions/upload-artifact@v4
        with:
          name: igi-app-signed
          path: |
            build/igi.app
            build/Igi.dmg
          if-no-files-found: ignore
          retention-days: 7
